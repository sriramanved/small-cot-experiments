# @package _global_
optim:
  eval_interval: 250
  eval_iters: 200
  log_interval: 10
  eval_only: false
  always_save_checkpoint: false
  init_from: scratch
  init_from_ckpt: ""
  continue_from_subset_size: 0
  gradient_accumulation_steps: 1
  batch_size: 64
  learning_rate: 0.001
  max_iters: 5000
  lr_decay_iters: 5000
  min_lr: 0.0001
  beta2: 0.99
  warmup_iters: 100
