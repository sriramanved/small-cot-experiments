defaults:
  - _self_
  - experiment: shakespeare_char
  - sweep: none

run:
  output_root: .
  name: default-run
  out_dir: ${run.output_root}/${run.name}

hydra:
  job:
    chdir: false
  run:
    dir: hydra_outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: hydra_multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${run.name}
