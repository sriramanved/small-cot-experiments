# @package _global_
task:
  task: modadd
  data_root: data
  teacher_output_root: ${modadd_teacher_root:${task.modadd_p},${task.modadd_m},${task.teacher_seed}}
  bank_seed: 1337
  teacher_seed: 1337
  render_seed: 1337
  teacher_depth: 1
  teacher_law: distributional_noise
  random_suffix_noise:
    enabled: true
    key_positions: semantic_key
    trigger_eta: null
    random_suffix_mode: valid_tokens
    keep_format_tokens: true
    seed: ${task.render_seed}
    apply_to: both
    coord_strategy: cyclic
    fixed_coord: 0
    eligible_values: [1, 2, 3, 4, 5]
    one_key_per_block: true
  dataset_prefix: ${modadd_noisy_dataset_prefix:${task.rollout_mode},${task.render_seed},${task.teacher_law}}
  modadd_p: 7
  modadd_m: 31
  subset_size: 1000000
  eta: 0.0
  dataset: ${modadd_noisy_dataset_name:${task.dataset_prefix},${task.modadd_p},${task.modadd_m},${task.subset_size},${task.eta}}
  rollout_mode: greedy_then_corrupt
  target_mode: tokens
