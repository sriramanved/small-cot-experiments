# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: s5_cot
  - /model: s5_depth1
  - /optim: synthetic_expert
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  output_root: ${task.teacher_output_root}
  name: ${s5_expert_run_name:${task.s5_m},${model.n_layer},${optim.seed},cot}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}

runtime:
  compile: true

optim:
  max_iters: 200000
  lr_decay_iters: ${optim.max_iters}
  s5_eval_metrics: true
