# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: openwebtext
  - /model: gpt2_124m
  - /optim: gpt2
  - /runtime: ddp_8gpu_bfloat16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: gpt2-124M
  out_dir: ${run.output_root}/out-gpt2-124M

logging:
  wandb_project: owt
