# @package _global_
defaults:
  - /pipeline: opd
  - /task: s5_opd
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: s5-opd-${task.objective}-n${task.subset_size}-eta${float_tag:${task.eta}}-${task.teacher_law}-${temp_tag:${task.student_temperature}}
  out_dir: ${run.output_root}/out-s5-opd-${task.objective}-n${task.subset_size}-eta${float_tag:${task.eta}}-${task.teacher_law}-${temp_tag:${task.student_temperature}}
