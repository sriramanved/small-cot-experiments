# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: modadd_noisy_offline_p7_m21
  - /model: modadd_p7_m21
  - /optim: synthetic_offline_bc
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: modadd-noisy-bc-p${task.modadd_p}-m${task.modadd_m}-n${task.subset_size}-eta${float_tag:${task.eta}}
  out_dir: ${run.output_root}/out-modadd-noisy-bc-p${task.modadd_p}-m${task.modadd_m}-n${task.subset_size}-eta${float_tag:${task.eta}}

optim:
  modadd_eval_metrics: true
  modadd_eval_clean_train_loss: true
