# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: s5_clean_offline
  - /model: s5_len21_cot
  - /optim: synthetic_offline_bc
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: s5-clean-offline-bc
  out_dir: ${run.output_root}/out-s5-clean-offline-bc

optim:
  s5_eval_metrics: true
  s5_eval_clean_train_loss: true
