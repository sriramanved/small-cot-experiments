# @package _global_
defaults:
  - /pipeline: nail
  - /task: s5_nail
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

task:
  teacher_signal: mc
  loss: reverse
  rollout_temperature_override: 0.0

run:
  output_root: ${path_join:${s5_suite_root:${task.s5_m},${task.teacher_seed},${task.render_seed},${optim.seed}},nail_reverse_mc_fixed}
  name: ${s5_student_prefix_run_name:nail,${task.loss},${task.teacher_signal},${task.s5_m},${task.subset_size},${task.eta},${task.teacher_law},${task.rollout_temperature_override},${task.loss_temperature_override},${optim.seed}}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
