# @package _global_
defaults:
  - /pipeline: opd
  - /task: modadd_opd
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: modadd-opd-${task.objective}-p${task.modadd_p}-m${task.modadd_m}-n${task.subset_size}-eta${float_tag:${task.eta}}-${task.teacher_law}-${temp_tag:${task.student_temperature}}-seed${optim.seed}
  out_dir: ${run.output_root}/out-modadd-opd-${task.objective}-p${task.modadd_p}-m${task.modadd_m}-n${task.subset_size}-eta${float_tag:${task.eta}}-${task.teacher_law}-${temp_tag:${task.student_temperature}}-seed${optim.seed}
