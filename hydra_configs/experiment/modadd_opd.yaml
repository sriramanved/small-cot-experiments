# @package _global_
defaults:
  - /pipeline: opd
  - /task: modadd_opd
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  output_root: ${path_join:${modadd_suite_root:${task.modadd_p},${task.modadd_m},${task.teacher_seed},${task.render_seed},${optim.seed}},opd_${task.objective}}
  name: ${modadd_opd_run_name:${task.objective},${task.modadd_p},${task.modadd_m},${task.subset_size},${task.eta},${task.teacher_law},${task.student_temperature},${optim.seed}}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
