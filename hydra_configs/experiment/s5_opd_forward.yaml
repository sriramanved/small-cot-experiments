# @package _global_
# Paper-facing OPD-F alias. This reuses the student_prefix backend currently
# exposed through the historical `nail` pipeline, but the method semantics are:
# sampled student prefixes + forward/teacher-sample loss.
defaults:
  - /pipeline: nail
  - /task: s5_nail
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

task:
  loss: forward
  teacher_signal: mc
  rollout_temperature_override: 1.0
  loss_temperature_override: null

run:
  output_root: ${path_join:${s5_suite_root:${task.s5_m},${task.teacher_seed},${task.render_seed},${optim.seed}},opd_forward_${task.teacher_signal}}
  name: ${s5_student_prefix_run_name:opd,${task.loss},${task.teacher_signal},${task.s5_m},${task.subset_size},${task.eta},${task.teacher_law},${task.rollout_temperature_override},${task.loss_temperature_override},${optim.seed},${task.kl_beta}}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
