# @package _global_
defaults:
  - /pipeline: opd_hf
  - /task: s5_opd
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  output_root: ${path_join:${s5_suite_root:${task.s5_m},${task.teacher_seed},${task.render_seed},${optim.seed}},opd_hf_${task.objective}}
  name: ${s5_opd_run_name:${task.objective},${task.s5_m},${task.subset_size},${task.eta},${task.teacher_law},${task.student_temperature},${optim.seed},hf}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
