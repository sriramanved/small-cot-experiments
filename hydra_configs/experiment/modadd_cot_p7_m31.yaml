# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: modadd_cot_p7_m31
  - /model: modadd_p7_m31
  - /optim: synthetic_expert
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: modadd-cot-p7-m31-depth1-seed${optim.seed}
  out_dir: ${run.output_root}/out-modadd-cot-p7-m31-depth1-seed${optim.seed}

optim:
  max_iters: 200000
  lr_decay_iters: ${optim.max_iters}
  modadd_eval_metrics: true
