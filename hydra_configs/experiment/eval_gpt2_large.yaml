# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: openwebtext
  - /model: teacher_inferred
  - /optim: eval_only
  - /runtime: gpu_float16
  - /logging: disabled
  - /cluster: local
  - _self_

run:
  name: eval-gpt2-large
  out_dir: ${run.output_root}/out-eval-gpt2-large

optim:
  init_from: gpt2-large
