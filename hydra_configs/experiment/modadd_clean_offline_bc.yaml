# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: modadd_clean_offline_p7_m21
  - /model: modadd_p7_m21
  - /optim: synthetic_offline_bc
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: modadd-clean-offline-bc-p${task.modadd_p}-m${task.modadd_m}
  out_dir: ${run.output_root}/out-modadd-clean-offline-bc-p${task.modadd_p}-m${task.modadd_m}

optim:
  modadd_eval_metrics: true
  modadd_eval_clean_train_loss: true
