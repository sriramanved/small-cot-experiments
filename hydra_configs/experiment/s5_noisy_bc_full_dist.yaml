# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: s5_noisy_full_dist
  - /model: s5_depth1
  - /optim: synthetic_offline_bc
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  output_root: ${path_join:${s5_suite_root:${task.s5_m},${task.teacher_seed},${task.render_seed},${optim.seed}},offline_bc}
  name: ${s5_noisy_bc_run_name:${task.s5_m},${task.subset_size},${task.eta},${task.rollout_mode},${task.target_mode},${optim.seed},${task.teacher_law}}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}

optim:
  offline_target_type: teacher_probs
  s5_eval_metrics: true
  s5_eval_clean_train_loss: true
