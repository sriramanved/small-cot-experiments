# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: s5_base
  - /model: s5_depth1
  - /optim: synthetic_expert
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  output_root: ${task.teacher_output_root}
  name: ${s5_expert_run_name:${task.s5_m},${model.n_layer},${optim.seed},base}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
