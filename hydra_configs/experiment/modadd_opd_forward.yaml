# @package _global_
# Paper-facing OPD-F alias: sampled student prefixes + forward/teacher-sample
# loss on the shared student_prefix backend.
defaults:
  - /pipeline: student_prefix
  - /task: modadd_nail
  - /model: teacher_inferred
  - /optim: opd
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

task:
  loss: forward
  teacher_signal: mc
  rollout_temperature_override: 1.0
  loss_temperature_override: null

run:
  output_root: ${path_join:${modadd_suite_root:${task.modadd_p},${task.modadd_m},${task.teacher_seed},${task.render_seed},${optim.seed}},opd_forward_${task.teacher_signal}}
  name: ${modadd_student_prefix_run_name:opd,${task.loss},${task.teacher_signal},${task.modadd_p},${task.modadd_m},${task.subset_size},${task.eta},${task.teacher_law},${task.rollout_temperature_override},${task.loss_temperature_override},${optim.seed},${task.kl_beta}}
  out_dir: ${path_join:${run.output_root},${out_name:${run.name}}}
