# @package _global_
defaults:
  - /pipeline: pretrain
  - /task: modadd_base_p7_m30
  - /model: modadd_p7_m30
  - /optim: synthetic_expert
  - /runtime: gpu_float16
  - /logging: enabled
  - /cluster: local
  - _self_

run:
  name: modadd-base-p7-m30-depth1
  out_dir: ${run.output_root}/out-modadd-base-p7-m30-depth1

optim:
  max_iters: 200000
  lr_decay_iters: ${optim.max_iters}
  modadd_eval_metrics: true
